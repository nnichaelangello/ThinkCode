<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail Siswa | ThinkCode</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #0B0B14;
      color: #fff;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
    }

    .risk-low {
      background: rgba(34, 197, 94, 0.2);
      color: #4ade80;
      border: 1px solid rgba(34, 197, 94, 0.3);
    }

    .risk-medium {
      background: rgba(245, 158, 11, 0.2);
      color: #fbbf24;
      border: 1px solid rgba(245, 158, 11, 0.3);
    }

    .risk-high {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .risk-moderate {
      background: rgba(245, 158, 11, 0.2);
      color: #fbbf24;
      border: 1px solid rgba(245, 158, 11, 0.3);
    }
  </style>
</head>

<body class="bg-gradient-to-br from-[#0B0B14] to-[#12121f] min-h-screen">
  <div class="max-w-6xl mx-auto p-8 relative z-10">
    <div class="mb-8">
      <a href="/teacher/dashboard.html"
        class="inline-flex items-center text-sm font-semibold text-indigo-400 hover:text-indigo-300 transition-colors mb-4">
        Kembali ke Dashboard
      </a>
      <div class="flex items-center gap-4">
        <div id="student-avatar"
          class="w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white text-2xl font-bold">
        </div>
        <div>
          <h1 id="student-name" class="text-3xl font-black text-white">Memuat...</h1>
          <p id="student-email" class="text-gray-400 text-sm mt-1">Memuat...</p>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8" id="summary-grid">
      <!-- Summary stats will be injected here -->
    </div>

    <div class="glass-card rounded-2xl overflow-hidden">
      <div class="p-5 border-b border-white/5 flex items-center justify-between">
        <h2 class="text-lg font-bold text-white">Rekapitulasi per Soal</h2>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-white/5 bg-white/5">
              <th class="text-left px-5 py-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Judul Soal
              </th>
              <th class="text-center px-5 py-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Status</th>
              <th class="text-center px-5 py-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Run</th>
              <th class="text-center px-5 py-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Error</th>
              <th class="text-center px-5 py-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">AI Req.
              </th>
              <th class="text-center px-5 py-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">AI Post
              </th>
              <th class="text-center px-5 py-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">AI Dep.
              </th>
              <th class="text-center px-5 py-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Copy Risk
              </th>
              <th class="text-center px-5 py-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Aksi</th>
            </tr>
          </thead>
          <tbody id="problems-tbody">
            <tr>
              <td colspan="8" class="p-8 text-center text-gray-500">Memuat data...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    function getToken() { return localStorage.getItem('tc_token'); }
    function escHtml(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

    async function apiFetch(url, opts = {}) {
      try {
        opts.headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}`, ...opts.headers };
        const res = await fetch(url, opts);
        if (res.status === 401) { window.location.href = '/login'; return null; }
        return await res.json();
      } catch (err) {
        console.error('apiFetch error:', err);
        return null;
      }
    }

    function riskBadge(label) {
      if (!label) return `<span class="text-xs font-bold px-2 py-0.5 rounded-full risk-low">UNKNOWN</span>`;
      const cls = { LOW: 'risk-low', MEDIUM: 'risk-medium', HIGH: 'risk-high', MODERATE: 'risk-moderate', INDEPENDENT: 'risk-low' };
      return `<span class="text-xs font-bold px-2 py-0.5 rounded-full ${cls[label] || 'risk-low'}">${label}</span>`;
    }

    async function loadData() {
      const urlParams = new URLSearchParams(window.location.search);
      const studentId = parseInt(urlParams.get('student'));
      const courseId = urlParams.get('course');

      if (!studentId || !courseId) {
        document.body.innerHTML = '<div class="p-8 text-center text-white">Parameter tidak valid.</div>';
        return;
      }

      const data = await apiFetch(`/api/analytics/class/${courseId}`);
      if (!data || !data.students) return;

      const student = data.students.find(s => s.id === studentId);
      if (!student) {
        document.body.innerHTML = '<div class="p-8 text-center text-white">Siswa tidak ditemukan.</div>';
        return;
      }

      document.getElementById('student-avatar').textContent = student.name.charAt(0).toUpperCase();
      document.getElementById('student-name').textContent = student.name;
      document.getElementById('student-email').textContent = student.email;

      const totalCompile = student.total_compile || 0;
      const totalError = student.total_error || 0;
      const totalAiReq = student.total_ai_requests || 0;
      const totalAiPostReq = student.total_ai_post_requests || 0;

      let overallAiDep = 'INDEPENDENT';
      if (student.avg_ai_dependency > 70) overallAiDep = 'HIGH';
      else if (student.avg_ai_dependency > 30) overallAiDep = 'MODERATE';
      else if (student.avg_ai_dependency > 0) overallAiDep = 'LOW';

      let overallCopy = 'LOW';
      if (student.avg_copy_score > 70) overallCopy = 'HIGH';
      else if (student.avg_copy_score > 30) overallCopy = 'MEDIUM';

      document.getElementById('summary-grid').innerHTML = `
        <div class="glass-card rounded-xl p-4 text-center">
          <div class="text-2xl font-black text-indigo-400 font-mono">${totalCompile}</div>
          <div class="text-xs text-gray-500 mt-1 uppercase tracking-wider font-bold">Total Run</div>
        </div>
        <div class="glass-card rounded-xl p-4 text-center">
          <div class="text-2xl font-black text-red-400 font-mono">${totalError}</div>
          <div class="text-xs text-gray-500 mt-1 uppercase tracking-wider font-bold">Total Error</div>
        </div>
        <div class="glass-card rounded-xl p-4 text-center">
          <div class="text-2xl font-black text-amber-400 font-mono">${totalAiReq}</div>
          <div class="text-xs text-gray-500 mt-1 uppercase tracking-wider font-bold">AI Req.</div>
        </div>
        <div class="glass-card rounded-xl p-4 text-center">
          <div class="text-2xl font-black text-purple-400 font-mono">${totalAiPostReq}</div>
          <div class="text-xs text-gray-500 mt-1 uppercase tracking-wider font-bold">AI Post</div>
        </div>
        <div class="glass-card rounded-xl p-4 text-center">
          <div class="text-lg font-black mt-1">${riskBadge(overallAiDep)}</div>
          <div class="text-xs text-gray-500 mt-2 uppercase tracking-wider font-bold">AI Dep.</div>
        </div>
        <div class="glass-card rounded-xl p-4 text-center">
          <div class="text-lg font-black mt-1">${riskBadge(overallCopy)}</div>
          <div class="text-xs text-gray-500 mt-2 uppercase tracking-wider font-bold">Copy Risk</div>
        </div>
      `;

      const tbody = document.getElementById('problems-tbody');
      if (!data.problems || data.problems.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" class="p-8 text-center text-gray-500">Belum ada soal di mata kuliah ini.</td></tr>';
        return;
      }

      tbody.innerHTML = data.problems.map(prob => {
        const sub = student.submissions.find(s => s.problem_id === prob.id) || {};

        let statusBadge = '<span class="text-xs font-bold px-2 py-0.5 rounded-full bg-gray-500/20 text-gray-400">Belum</span>';
        if (sub.status === 'accepted') {
          statusBadge = '<span class="text-xs font-bold px-2 py-0.5 rounded-full bg-green-500/20 text-green-400 border border-green-500/30">Selesai</span>';
        } else if (sub.status) {
          statusBadge = `<span class="text-xs font-bold px-2 py-0.5 rounded-full bg-amber-500/20 text-amber-400 border border-amber-500/30">${sub.status.toUpperCase()}</span>`;
        }

        let aiDepLabel = 'INDEPENDENT';
        if (sub.ai_dependency_score > 70) aiDepLabel = 'HIGH';
        else if (sub.ai_dependency_score > 30) aiDepLabel = 'MODERATE';
        else if (sub.ai_dependency_score > 0) aiDepLabel = 'LOW';

        let copyLabel = 'LOW';
        if (sub.copy_score > 70) copyLabel = 'HIGH';
        else if (sub.copy_score > 30) copyLabel = 'MEDIUM';

        return `
          <tr class="border-b border-white/5 hover:bg-white/[0.02] transition-colors">
            <td class="px-5 py-4">
              <div class="font-semibold text-white">${escHtml(prob.title)}</div>
              <div class="text-xs text-gray-500 mt-1 capitalize">${prob.difficulty}</div>
            </td>
            <td class="px-5 py-4 text-center">${statusBadge}</td>
            <td class="px-5 py-4 text-center font-mono text-indigo-400">${sub.compile_count || 0}</td>
            <td class="px-5 py-4 text-center font-mono text-red-400">${sub.error_count || 0}</td>
            <td class="px-5 py-4 text-center font-mono text-amber-400">${sub.ai_request_count || 0}</td>
            <td class="px-5 py-4 text-center font-mono text-purple-400">${sub.ai_post_request_count || 0}</td>
            <td class="px-5 py-4 text-center">${sub.id ? riskBadge(aiDepLabel) : '-'}</td>
            <td class="px-5 py-4 text-center">${sub.id ? riskBadge(copyLabel) : '-'}</td>
            <td class="px-5 py-4 text-center">
              <a href="/teacher/student-review.html?student=${student.id}&problem=${prob.id}" class="inline-block px-4 py-2 rounded-xl text-xs font-bold text-white bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-400 hover:to-purple-500 transition-all shadow-lg shadow-indigo-500/25 whitespace-nowrap">Buka Review</a>
            </td>
          </tr>
        `;
      }).join('');
    }

    loadData();
  </script>
</body>

</html>
